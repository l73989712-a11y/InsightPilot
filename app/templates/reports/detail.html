{% extends "base.html" %}
{% block title %}{{ report.title }}{% endblock %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
  <div><h2>{{ report.title }}</h2><p class="text-muted">{{ report.created_at.strftime('%Y-%m-%d %H:%M') }}</p></div>
  <a class="btn btn-primary" href="{{ url_for('reports.export', report_id=report.id) }}">导出 HTML</a>
</div>
<div class="card app-card"><div class="card-body report-frame">{{ report.content_html|safe }}</div></div>
{% endblock %}
